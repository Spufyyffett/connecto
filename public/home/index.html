<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connecto</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="img/logo.svg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <main class="chat-wrapper">
        <aside class="sidebar">
          <div class="search-bar">
            <input
              type="text"
              placeholder="Search users..."
              id="findUsers"
              title="Search for friends and other Users"
            />
            <button class="clearInput" id="clearInput" title="Clear Input">
              <span class="material-symbols-outlined"> close_small </span>
            </button>
          </div>
          <ul class="user-list" id="user-list"></ul>
        </aside>

        <section class="chat-area">
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input-area" id="chat-input-area">
            <div class="inputField">
              <textarea
                id="messageInput"
                placeholder="Type a message..."
                rows="1"
                autofocus
                title="Message"
              ></textarea>
              <button class="get-file-icon" id="getFileIcon">
                <span class="material-symbols-outlined"> attach_file </span>
              </button>
              <input type="file" name="fileInput" id="fileInput" />
            </div>
            <button class="sendBtn" id="sendBtn" title="Send Message">
              <span class="material-symbols-outlined sendBtnIcon"> send </span>
            </button>
          </div>
        </section>
      </main>
    </div>
    <script
      src="https://cdn.socket.io/4.8.3/socket.io.min.js"
      integrity="sha384-kzavj5fiMwLKzzD1f8S7TeoVIEi7uKHvbTA3ueZkrzYq75pNQUiUi6Dy98Q3fxb0"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
